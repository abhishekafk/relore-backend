services:
  - type: web
    name: relore-backend
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: relore-redis
          property: connectionString
      - key: EXPO_ACCESS_TOKEN
        sync: false

  - type: redis
    name: relore-redis
    plan: free
    region: singapore
    maxmemoryPolicy: noeviction
